name: monitor

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min
  workflow_dispatch:

permissions:
  contents: read

jobs:
  uptime:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Probe every channel URL
        run: node ops/monitor.mjs
        env:
          BASE: https://swarm.impt.io
