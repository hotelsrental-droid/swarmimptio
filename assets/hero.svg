<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">IMPT Swarm Widget — open-source hotel widget that pays 5%</title>
  <desc id="desc">A cream search box renders on a dark cream background. Headline: The hotel widget that pays you 5%. One line, MIT licensed, 90-day cookie window.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAF7F0"/>
      <stop offset="100%" stop-color="#F0EBDF"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#08423a" flood-opacity="0.18"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#08423a" flood-opacity="0.12"/>
    </filter>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#08423a" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#dots)"/>

  <g transform="translate(80, 96)" font-family="Georgia, 'Times New Roman', serif">
    <!-- pill -->
    <g>
      <rect x="0" y="0" rx="999" width="240" height="34" fill="#08423a"/>
      <text x="120" y="22" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700"
            fill="#C8FF7E" text-anchor="middle" letter-spacing="2.4">OPEN SOURCE · MIT · v0.1.0</text>
    </g>

    <!-- headline — dx offsets force explicit spacing around the italic "5%" -->
    <text font-size="80" font-weight="700" fill="#08423a" letter-spacing="-2">
      <tspan x="0" y="138">The hotel widget</tspan>
    </text>
    <text font-size="80" font-weight="700" fill="#08423a" letter-spacing="-2">
      <tspan x="0" y="226">that pays you</tspan><tspan dx="22" font-style="italic" font-weight="700">5%</tspan><tspan dx="2">.</tspan>
    </text>

    <!-- subhead -->
    <text font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="400" fill="#3a6b62">
      <tspan x="0" y="278">One line. Drop it on any site. MIT licensed. 8.7KB.</tspan>
      <tspan x="0" y="306">90-day cookie. Beats Booking (4% / 30d) and Expedia (4% / 7d).</tspan>
    </text>

    <!-- code block -->
    <g transform="translate(0, 340)" filter="url(#softShadow)">
      <rect x="0" y="0" rx="14" width="540" height="118" fill="#08423a"/>
      <g font-family="ui-monospace, 'SF Mono', Consolas, Menlo, monospace" font-size="13">
        <text x="22" y="36" fill="#FAF7F0">
          <tspan fill="#9BE6B0">&lt;script </tspan><tspan fill="#FFD49B">src</tspan><tspan>=</tspan><tspan fill="#FFFFFF">"https://swarm.impt.io/widget.js"</tspan>
        </text>
        <text x="22" y="58" fill="#FAF7F0">
          <tspan>        </tspan><tspan fill="#FFD49B">data-key</tspan><tspan>=</tspan><tspan fill="#FFFFFF">"YOUR_KEY"</tspan><tspan> </tspan><tspan fill="#FFD49B">async</tspan><tspan fill="#9BE6B0">&gt;&lt;/script&gt;</tspan>
        </text>
        <text x="22" y="84" fill="#FAF7F0">
          <tspan fill="#9BE6B0">&lt;div </tspan><tspan fill="#FFD49B">id</tspan><tspan>=</tspan><tspan fill="#FFFFFF">"impt-swarm"</tspan><tspan fill="#9BE6B0">&gt;&lt;/div&gt;</tspan>
        </text>
      </g>
      <g transform="translate(22, 100)" opacity="0.5">
        <circle cx="0" cy="0" r="4" fill="#FF6363"/>
        <circle cx="14" cy="0" r="4" fill="#FFD262"/>
        <circle cx="28" cy="0" r="4" fill="#9BE6B0"/>
      </g>
    </g>
  </g>

  <!-- right column: rendered widget mock -->
  <g transform="translate(720, 100)" filter="url(#cardShadow)">
    <rect x="0" y="0" rx="28" width="480" height="420" fill="#FAF7F0" stroke="#08423a" stroke-opacity="0.12"/>

    <text x="36" y="58" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600"
          fill="#3a6b62" letter-spacing="2.4">HOTELS WITH CONSCIENCE</text>

    <text x="36" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700" fill="#08423a">
      <tspan x="36" y="100">Find your next stay.</tspan>
      <tspan x="36" y="134">Plant a tree per booking.</tspan>
    </text>

    <text x="36" y="186" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500"
          fill="#3a6b62" letter-spacing="2">WHERE TO</text>

    <rect x="36" y="198" rx="14" width="408" height="50" fill="#FFFFFF" stroke="#08423a" stroke-opacity="0.18"/>
    <text x="56" y="230" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#08423a">Dublin, IE</text>
    <path d="M412 222 l8 8 8 -8" stroke="#08423a" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="36" y="272" rx="14" width="408" height="52" fill="#C8FF7E"/>
    <text x="240" y="306" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600"
          fill="#08423a" text-anchor="middle">Search hotels →</text>

    <g transform="translate(36, 362)">
      <circle cx="6" cy="0" r="6" fill="#C8FF7E"/>
      <text x="22" y="4" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#3a6b62">€5 free credit · 5% Goodness back · 1 tonne CO₂ retired</text>
    </g>
    <text x="444" y="378" text-anchor="end" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11"
          fill="#3a6b62">Powered by IMPT</text>
  </g>

  <!-- bottom comparison strip -->
  <g transform="translate(80, 540)">
    <line x1="0" y1="0" x2="1120" y2="0" stroke="#08423a" stroke-opacity="0.12"/>
    <g transform="translate(0, 28)">
      <text font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600"
            fill="#3a6b62" letter-spacing="2">
        <tspan x="0" y="0">VS BOOKING.COM</tspan>
      </text>
      <text font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#08423a">
        <tspan x="0" y="36">+1% commission · 3× longer cookie</tspan>
      </text>
    </g>
    <g transform="translate(580, 28)">
      <text font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600"
            fill="#3a6b62" letter-spacing="2">
        <tspan x="0" y="0">VS EXPEDIA</tspan>
      </text>
      <text font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#08423a">
        <tspan x="0" y="36">+1% commission · 13× longer cookie</tspan>
      </text>
    </g>
  </g>
</svg>
